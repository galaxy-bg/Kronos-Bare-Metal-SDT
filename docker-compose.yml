services:
  postgres:
    image: postgres:16-alpine
    container_name: kronos-sdt-postgres
    environment:
      POSTGRES_DB: kronos_sdt
      POSTGRES_USER: kronos
      POSTGRES_PASSWORD: kronos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kronos -d kronos_sdt"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: kronos-sdt-backend
    environment:
      DATABASE_URL: postgresql+psycopg://kronos:kronos@postgres:5432/kronos_sdt
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini

  frontend:
    build:
      context: ./frontend
    container_name: kronos-sdt-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  postgres_data:
